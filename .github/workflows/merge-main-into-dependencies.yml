name: Merge main into dependency branch

on:
  schedule:
    - cron: "0 12 * * 6" # 7am EST / 8am EDT — always ≥1hr before Dependabot at 9am ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge main into updates/dependencies
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout updates/dependencies || git checkout -b updates/dependencies origin/main
          git merge --no-edit origin/main
          git push origin updates/dependencies
