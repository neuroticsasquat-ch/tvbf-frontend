services:
  tvbf-frontend:
    build:
      context: .
      target: dev
    container_name: tvbf_frontend
    volumes:
      - ./:/app
      - tvbf_frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-https://api.tvbf.localhost}"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.tvbf-frontend.rule=Host(`app.tvbf.localhost`)"
      - "traefik.http.routers.tvbf-frontend.tls=true"
      - "traefik.http.routers.tvbf-frontend.entrypoints=websecure"
      - "traefik.http.services.tvbf-frontend.loadbalancer.server.port=5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true

volumes:
  tvbf_frontend_node_modules:
